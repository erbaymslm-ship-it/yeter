name: Build Elixir APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout kodu al
      uses: actions/checkout@v4

    - name: Python 3.10 kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları kur
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip build-essential \
          libssl-dev libffi-dev \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev \
          zlib1g-dev

    - name: Buildozer kur
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.37

    - name: Android NDK/SDK önbellek
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer/android/platform
          ~/.buildozer/android/ndk
        key: buildozer-${{ runner.os }}-v2

    - name: APK derle
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android debug 2>&1 | tee build.log
      timeout-minutes: 60

    - name: APK'yı artifact olarak yükle
      uses: actions/upload-artifact@v4
      with:
        name: elixir-apk
        path: bin/*.apk
        retention-days: 30

    - name: Build logunu yükle (hata durumunda)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
